# Nginx config for IngestIQ at http://new.packt.localhost:8004
# Copy to your nginx sites (e.g. /opt/homebrew/etc/nginx/servers/ or /usr/local/etc/nginx/servers/)
# Ensure new.packt.localhost resolves to 127.0.0.1 (e.g. in /etc/hosts)

server {
    listen 8004;
    server_name new.packt.localhost;

    # Allow large document uploads (PDF/DOCX)
    client_max_body_size 200M;

    root /Users/sanjeev/Sites/IngestIQ/frontend/dist;
    index index.html;

    # Frontend SPA: try file, then fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # API: proxy to backend (uvicorn on 8889)
    location /api/ {
        proxy_pass http://127.0.0.1:8889/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health (optional)
    location /health {
        proxy_pass http://127.0.0.1:8889/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
